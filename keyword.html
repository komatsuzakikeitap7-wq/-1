<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パワー全開！最後のあいことば</title>
    <style>
        /* 全体の設定：エネルギッシュで力強い雰囲気 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 燃え上がるようなオレンジと黄色のグラデーション */
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 100%);
            overflow: hidden;
            /* 力強く、角ばった、インパクトのあるサンセリフ体 */
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: #fff;
        }

        /* 集中線エフェクト（背景） */
        .radial-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: repeating-radial-gradient(circle at center, transparent, transparent 50px, rgba(255, 255, 255, 0.1) 50px, rgba(255, 255, 255, 0.1) 100px);
            z-index: 1;
            animation: radialRotate 20s linear infinite;
        }

        /* コンテンツの配置 */
        .container {
            text-align: center;
            z-index: 10;
            /* 最初は透明で、ドーン！と現れる */
            opacity: 0;
            transform: scale(0.5);
            animation: powerEntrance 0.8s ease-out forwards;
        }

        .keyword-text {
            display: inline-block;
            padding: 20px;
        }

        /* 「あいことば⑥」：白くてぶっとい、黒縁取り */
        .phrase {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: 1px;
            /* 強烈な黒い縁取り */
            text-shadow: 
                -2px -2px 0 #000,
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                0 5px 10px rgba(0, 0, 0, 0.5);
        }

        /* 「”ン”」：超巨大、赤、金縁取り、揺れる */
        .keyword {
            font-size: 10rem;
            /* 燃えるような赤 */
            color: #ff0000; 
            font-weight: 900;
            display: block;
            margin-top: 25px;
            /* 強烈な金色の縁取りと、影 */
            text-shadow: 
                -3px -3px 0 #fff,
                 3px -3px 0 #fff,
                -3px  3px 0 #fff,
                 3px  3px 0 #fff,
                -6px -6px 0 #ffd700,
                 6px -6px 0 #ffd700,
                -6px  6px 0 #ffd700,
                 6px  6px 0 #ffd700,
                0 10px 20px rgba(0, 0, 0, 0.8);
            /* 少し傾けて、筋肉のように盛り上がるアニメーション */
            transform: rotate(-5deg);
            animation: muscleFlex 0.4s infinite alternate ease-in-out;
        }

        /* --- アニメーション定義 --- */
        
        /* 画面全体がドーン！と現れる */
        @keyframes powerEntrance {
            0% { opacity: 0; transform: scale(0.5); }
            80% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 「ン」が筋肉のように盛り上がる（振動） */
        @keyframes muscleFlex {
            from { transform: rotate(-5deg) scale(1); }
            to { transform: rotate(5deg) scale(1.05); }
        }

        /* 背景の集中線が回転する */
        @keyframes radialRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 背景を飛び交うビックリマークスタイル */
        .exclamation {
            position: absolute;
            font-weight: 900;
            pointer-events: none;
            z-index: 5;
            animation: exclamationFly linear infinite;
        }

        /* ビックリマークがランダムに飛び出す */
        @keyframes exclamationFly {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(var(--s)) rotate(var(--r)); opacity: 0; }
        }
    </style>
</head>
<body>
