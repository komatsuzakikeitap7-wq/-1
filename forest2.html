<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>森のあいことば</title>
    <style>
        /* 全体の設定 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 森の奥深さを表現するベースの緑 */
            background-color: #1a4d1a;
            font-family: 'Hiragino Mincho ProN', 'Georgia', serif; /* 少しクラフト感のあるセリフ体 */
        }

        /* --- 森のイラスト背景 (CSSのみで表現) --- */
        .forest-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 木立 */
        .forest-background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                /* 遠くの木立 */
                linear-gradient(90deg, #133a13 5px, transparent 5px) 0 0 / 50px 100%,
                linear-gradient(90deg, #133a13 3px, transparent 3px) 25px 0 / 60px 100%,
                /* 近くの木立 */
                linear-gradient(90deg, #0d290d 10px, transparent 10px) 10px 0 / 80px 100%,
                linear-gradient(90deg, #0d290d 8px, transparent 8px) 50px 0 / 90px 100%;
            opacity: 0.6;
        }

        /* 葉っぱの重なり */
        .forest-background::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: 
                radial-gradient(circle at 20% 120%, #2e8b57 0%, #2e8b57 40%, transparent 42%) 0 0 / 200px 200px,
                radial-gradient(circle at 80% 130%, #3cb371 0%, #3cb371 35%, transparent 37%) 100px 0 / 180px 180px,
                radial-gradient(circle at 50% 140%, #228b22 0%, #228b22 50%, transparent 52%) -50px 0 / 250px 250px;
            opacity: 0.8;
            filter: blur(1px); /* 少しぼかして柔らかく */
        }

        /* 木漏れ日の光線 */
        .sun-rays {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 220, 0.1) 0%, transparent 50%, rgba(255, 255, 220, 0.05) 100%);
            z-index: 2;
            animation: raysSway 10s infinite ease-in-out;
        }

        /* --- コンテンツ (テキスト) --- */
        .container {
            text-align: center;
            z-index: 10;
            /* 最初は透明で、ふわっと表示 */
            opacity: 0;
            animation: fadeInSlightly 2s ease-out forwards;
        }

        .keyword-text {
            display: inline-block;
            padding: 20px;
            /* 森の中に溶け込むような、少しザラッとした質感の影 */
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.5),
                -1px -1px 0 rgba(0, 0, 0, 0.2);
        }

        /* 「あいことば③」：白色 */
        .phrase {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        /* 「”オ”」：オレンジ色 */
        .keyword {
            font-size: 5rem;
            color: #ff8c00; /* 鮮やかなオレンジ */
            font-weight: bold;
            display: block;
            margin-top: 15px;
            /* オレンジの文字を際立たせる白の縁取り */
            text-shadow: 
                0 0 10px rgba(255, 140, 0, 0.8),
                2px 2px 0 #fff,
                -2px -2px 0 #fff,
                2px -2px 0 #fff,
                -2px 2px 0 #fff;
        }

        /* --- アニメーション定義 --- */
        
        /* 画面全体がふわっと出る */
        @keyframes fadeInSlightly {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 木漏れ日の光線がゆらぐ */
        @keyframes raysSway {
            0%, 100% { transform: skewX(-5deg) translateX(-10px); opacity: 0.8; }
            50% { transform: skewX(5deg) translateX(10px); opacity: 1; }
        }

        /* 光の粒 (木漏れ日) スタイル */
        .light-particle {
            position: absolute;
            background-color: rgba(255, 255, 200, 0.3); /* 薄い黄色の光 */
            border-radius: 50%;
            pointer-events: none;
            filter: blur(3px); /* 少しぼかす */
            z-index: 3;
            animation: lightFall linear infinite;
        }

        /* 光の粒が上から下へ舞い落ちる */
        @keyframes lightFall {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) translateX(100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="forest-background"></div>
    <div class="sun-rays"></div>

    <div class="container">
        <div class="keyword-text">
            <div class="phrase">あいことば③</div>
            <span class="keyword">”オ”</span>
        </div>
    </div>

    <script>
        function createLight() {
            const container = document.body;
            const light = document.createElement('div');
            light.classList.add('light-particle');
            
            // ランダムなサイズと位置
            const size = Math.random() * 30 + 10 + 'px'; // 10px〜40px
            light.style.width = size;
            light.style.height = size;
            light.style.left = Math.random() * 100 + 'vw';
            
            // ランダムなアニメーション時間（落ちるスピード）
            const duration = Math.random() * 5 + 8 + 's'; // 8s〜13s
            light.style.animationDuration = duration;
            
            // ランダムな開始遅延
            light.style.animationDelay = Math.random() * 5 + 's';

            container.appendChild(light);

            // アニメーション終了後に要素を削除（メモリ対策）
            setTimeout(() => {
                light.remove();
            }, 18000); // アニメーション時間より長く設定
        }

        // 最初にいくつか生成し、その後一定間隔で生成
        for(let i=0; i<20; i++) {
            createLight();
        }
        setInterval(createLight, 400); // 0.4秒ごとに新しい光を生成
    </script>
</body>
</html>
