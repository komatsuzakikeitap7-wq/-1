<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>街の記憶、一個前のポスト</title>
    <style>
        /* 全体の設定 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Hiragino Mincho ProN', 'Georgia', serif; /* 情緒のある明朝体 */
            color: #fff;
        }

        /* --- 背景画像の設定 (image_0.pngを使用) --- */
        .city-background {
            position: fixed;
            top: -10px; /* 動きのための余白 */
            left: -10px;
            width: 110vw; /* 動きのための余白 */
            height: 110vh;
            /* 提供された画像ファイルを指定 */
            background-image: url('image_0.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            /* 背景がゆっくりと揺らぐアニメーション (エモさ演出) */
            animation: slowParallax 15s infinite ease-in-out;
        }

        /* 集中力を高めるための、少し暗いオーバーレイ */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vw;
            background-color: rgba(0, 0, 0, 0.4); /* 暗くしてテキストを際立たせる */
            z-index: 2;
        }

        /* --- コンテンツ (テキスト) --- */
        .container {
            text-align: center;
            z-index: 10;
            /* 最初は透明で、ふわっと現れる */
            opacity: 0;
            animation: fadeInSlightly 3s ease-out forwards;
        }

        .keyword-text {
            display: inline-block;
            padding: 20px;
            /* 背景に溶け込むような、少し柔らかい影 */
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
        }

        /* 「一個前のポストの中を見ろ」：白 */
        .phrase {
            font-size: 2rem;
            color: #fff;
            letter-spacing: 5px; /* 文字間隔を広げて少しミステリアスに */
            /* 少しベージュがかった白に (レトロ感) */
            color: #fdfdfd;
        }
        
        /* 最後の「！」：薄い黄色 */
        .phrase::after {
            content: '！';
            color: #ffcc00; /* 薄い黄色 */
        }

        /* --- アニメーション定義 --- */
        
        /* 画面全体がふわっと現れる */
        @keyframes fadeInSlightly {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 背景がゆっくりと揺らぐアニメーション */
        @keyframes slowParallax {
            0%, 100% { transform: translate(10px, 10px); }
            50% { transform: translate(-10px, -10px); }
        }

        /* 漂う光の粒スタイル (前回のものを情緒的に調整) */
        .light-particle {
            position: absolute;
            background-color: rgba(255, 255, 200, 0.3); /* 薄い黄色の光 */
            border-radius: 50%;
            pointer-events: none;
            filter: blur(5px); /* 少しぼかす */
            z-index: 3;
            animation: lightDrift linear infinite;
        }

        /* 光の粒が画面内をゆっくりと漂う */
        @keyframes lightDrift {
            0% { transform: translateY(110vh) translateX(-20vw); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(20vw); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="city-background"></div>
    <div class="overlay"></div>

    <div class="container">
        <div class="keyword-text">
            <div class="phrase">一個前のポストの中を見ろ</div>
        </div>
    </div>

    <script>
        function createLight() {
            const container = document.body;
            const light = document.createElement('div');
            light.classList.add('light-particle');
            
            // ランダムなサイズと位置（大きくぼかした光）
            const size = Math.random() * 200 + 100 + 'px'; // 100px〜300px
            light.style.width = size;
            light.style.height = size;
            light.style.left = Math.random() * 100 + 'vw';
            
            // ランダムなアニメーション時間（ゆっくりと漂う）
            const duration = Math.random() * 10 + 15 + 's'; // 15s〜25s
            light.style.animationDuration = duration;
            
            // ランダムな開始遅延
            light.style.animationDelay = Math.random() * 10 + 's';

            container.appendChild(light);

            // アニメーション終了後に要素を削除
            setTimeout(() => {
                light.remove();
            }, 30000); 
        }

        // 最初にいくつか生成し、その後一定間隔で生成
        for(let i=0; i<8; i++) {
            createLight();
        }
        setInterval(createLight, 3000); // 3秒ごとに新しい光を生成
    </script>
</body>
</html>
