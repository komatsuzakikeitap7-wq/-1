<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION：警告</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #0a1f33 0%, #000 100%);
            color: #fff;
            font-family: 'Hiragino Mincho ProN', serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* テープの共通設定 */
        .tape {
            position: absolute;
            background: repeating-linear-gradient(45deg, #cc0, #cc0 20px, #000 20px, #000 40px);
            opacity: 0.7;
            z-index: 1;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            width: 150vw;
            height: 60px;
        }

        .tape-1 { transform: rotate(-25deg) translate(-10%, -100px); }
        .tape-2 { transform: rotate(15deg) translate(-10%, 150px); }

        #warning-screen {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .warning-text {
            font-size: 5rem;
            font-weight: bold;
            color: #cc0;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(204, 204, 0, 0.6);
            animation: sway 4s infinite ease-in-out;
        }

        #mission-screen {
            display: none;
            z-index: 20;
            text-align: center;
        }

        .mission-title { color: #ff0; font-size: 2rem; border-bottom: 2px solid #ff0; margin-bottom: 20px; }
        .mission-text { font-size: 1.5rem; line-height: 1.8; }

        @keyframes sway {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .fade-out { opacity: 0; transition: opacity 1s; }
    </style>
</head>
<body>

    <div id="warning-screen">
        <div class="tape tape-1"></div>
        <div class="tape tape-2"></div>
        <div class="warning-text">Warning</div>
    </div>

    <div id="mission-screen">
        <div class="mission-title">[Mission]</div>
        <div class="mission-text" id="typewriter"></div>
    </div>

    <script>
        const warningScreen = document.getElementById('warning-screen');
        const missionScreen = document.getElementById('mission-screen');
        const typewriterElement = document.getElementById('typewriter');
        const text = "B棟にいる部員から\n二つ目の合言葉を聞き出せ！";

        setTimeout(() => {
            warningScreen.classList.add('fade-out');
            setTimeout(() => {
                warningScreen.style.display = 'none';
                missionScreen.style.display = 'block';
                
                let i = 0;
                function type() {
                    if (i < text.length) {
                        typewriterElement.textContent += text.charAt(i);
                        i++;
                        setTimeout(type, 100);
                    }
                }
                type();
            }, 1000);
        }, 3000);
    </script>
</body>
</html>
