<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION：警告</title>
    <style>
        /* 全体の設定：情緒のある深い雰囲気 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* 深い青から黒へのグラデーション (情緒のある黄昏時) */
            background: radial-gradient(circle at center, #0a1f33 0%, #000 100%);
            color: #fff;
            font-family: 'Hiragino Mincho ProN', 'Georgia', serif; /* 情緒のある明朝体 */
        }

        /* --- 警告画面のスタイル (マイルドに修正) --- */
        #warning-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        /* --- テープが張り巡らされる演出 --- */
        #warning-screen::before,
        #warning-screen::after,
        #warning-screen .tape {
            content: '';
            position: absolute;
            background-image: repeating-linear-gradient(45deg, #cc0, #cc0 10px, transparent 10px, transparent 20px); /* 黄色と黒のテープパターン */
            opacity: 0.8;
