<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSION</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 警告画面のスタイル */
        #danger-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f00;
            animation: flash 0.2s infinite;
            z-index: 100;
        }

        .danger-text {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            animation: shake 0.1s infinite;
        }

        /* ミッション画面のスタイル */
        #mission-screen {
            display: none; /* 最初は隠しておく */
            text-align: center;
            padding: 20px;
            z-index: 50;
        }

        .mission-title {
            color: #ff0;
            font-size: 2rem;
            margin-bottom: 20px;
            border-bottom: 2px solid #ff0;
            display: inline-block;
        }

        .mission-text {
            font-size: 1.5rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }

        /* アニメーション定義 */
        @keyframes flash {
            0% { background-color: #f00; }
            50% { background-color: #000; }
            100% { background-color: #f00; }
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(1px, -1px) rotate(-1deg); }
            60% { transform: translate(-2px, 2px) rotate(0deg); }
            80% { transform: translate(2px, 1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* 画面が消える時のアニメーション */
        .fade-out {
            animation: fadeOut 0.5s forwards;
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; visibility: hidden; }
        }
    </style>
</head>
<body>

    <div id="danger-screen">
        <div class="danger-text">Danger!</div>
    </div>

    <div id="mission-screen">
        <div class="mission-title">[Mission]</div>
        <div class="mission-text" id="typewriter"></div>
    </div>

    <script>
        const dangerScreen = document.getElementById('danger-screen');
        const missionScreen = document.getElementById('mission-screen');
        const typewriterElement = document.getElementById('typewriter');
        const text = "B棟にいる部員から\n二つ目の合言葉を聞き出せ！";

        // 1. 2.5秒後に警告を消してミッションを表示
        setTimeout(() => {
            dangerScreen.classList.add('fade-out');
            
            setTimeout(() => {
                dangerScreen.style.display = 'none';
                missionScreen.style.display = 'block';
                startTypewriter();
            }, 500);
        }, 2500);

        // 2. タイプライター風の文字表示
        function startTypewriter() {
            let i = 0;
            function type() {
                if (i < text.length) {
                    typewriterElement.textContent += text.charAt(i);
                    i++;
                    setTimeout(type, 100); // 文字が出るスピード（ミリ秒）
                }
            }
            type();
        }
    </script>
</body>
</html>
